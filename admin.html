<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedRace · Редактор</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="redrace-widget">

    <header class="widget-header">
        <div class="logo">🏎️ Red<span>Race</span></div>
        <div class="user-info">
            <div class="user-avatar" id="userAvatar">K</div>
            <div class="user-name">
                <strong id="userDisplayName">Кими</strong><br>
                <span style="font-size:12px; color:#666;">редактор</span>
            </div>
        </div>
    </header>

    <div class="widget-body">

        <div class="input-group">
            <label>📡 RSS-источник</label>
            <div class="rss-row">
                <input type="url" id="rssUrl" placeholder="https://example.com/feed.rss">
                <button class="btn btn-secondary" id="fetchRssBtn">Загрузить</button>
            </div>
        </div>

        <div class="input-group">
            <label>📰 Заголовок</label>
            <input type="text" id="postTitle" placeholder="Например: Хэмилтон выиграл Гран-при">
        </div>

        <div class="input-group">
            <label>✍️ Текст новости</label>
            <textarea id="postContent" placeholder="Введите текст новости..."></textarea>
        </div>

        <div class="input-group">
            <label>🏷️ Теги</label>
            <input type="text" id="postTags" placeholder="F1, Гран-при, Mercedes">
            <span class="hint">Разделяйте теги запятыми</span>
        </div>

        <div class="preview-box">
            <h3>👁️ Предпросмотр</h3>
            <div class="post-preview" id="previewArea">
                <span class="empty">Здесь будет отображаться ваш пост...</span>
            </div>
        </div>

        <button class="btn btn-primary btn-block" id="sendToBotBtn">
            📤 Отправить в Telegram
        </button>

    </div>

    <footer class="widget-footer">
        <div class="status">
            <span class="dot green" id="statusDot"></span>
            <span id="statusText">Готов к работе</span>
        </div>
        <span class="version">RedRace v1.0</span>
    </footer>

</div>

<script src="js/api.js"></script>
<script src="js/widget.js"></script>
</body>
</html>
