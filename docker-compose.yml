# ============================================================
# RedRace Backend — Docker Compose
# ============================================================

version: '3.8'

services:
  backend:
    build: .
    container_name: redrace-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BOT_TOKEN=${BOT_TOKEN}
      - SECRET_KEY=${SECRET_KEY}
      - API_BASE=${API_BASE}
      - RSS_CACHE_TTL=${RSS_CACHE_TTL:-300}
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - redrace-network

networks:
  redrace-network:
    driver: bridge
